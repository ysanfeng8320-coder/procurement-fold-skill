species_id: police
display_name: 公安局
granularity: 局级机关（市局/分局本级；派出所默认排除）

# 用于 API/本地检索的种子词（物种优先）
search_keywords:
  - 公安局
  - 公安分局
  - 公安厅

# 与产品包拼桥接检索（物种名+产品词），用于拉到「公安×印控」类事件
bridge_prefixes:
  - 公安局
  - 公安

# 单位名或标题命中即视为本物种候选
include_name_keywords:
  - 公安局
  - 公安分局
  - 公安厅
  - 公安局交警
  - 公安交通

# 命中 include 但仍排除（主序列不收）
exclude_name_keywords:
  - 派出所
  - 警务室
  - 检查站
  - 拘留所
  - 看守所
  - 强制隔离

# 行政层级推断（简单规则）
level_rules:
  省级: [省公安厅, 公安厅]
  市级: [市公安局]
  分局: [公安分局, 分局]
  其他: []

discovery_hint: 发现区用于学「公安采购序列 + 跨地跟风」；落地区出名单。
