# 公安局稳定属性轴（不是扁「买方系统」标签）
# 用于结构描述与相似比较；具体单位仍保留真名。

axes:
  org_form:
    description: 组织形态
    values: [机关本级, 分局, 垂管/条线, 其他]
  level:
    description: 行政层级
    values: [省级, 市级, 分局, 其他]
  seal_scene:  # 本品相关时可被 product pack 加权
    description: 用印/印章相关场景倾向
    values: [多点用印, 强监管禁外带, 集中管章, 窗口便民, 未知]

notes: |
  公安与检察院/农业局等不可共用一个「局」标签。
  本物种内比较：同级跨地跟风 > 跨物种类比。
